<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to WeeklyPlayer...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 20px;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 500px;
      width: 100%;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #f97316;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success { color: #10b981; margin-top: 20px; font-size: 1.1em; }
    .error { color: #ef4444; margin-top: 20px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 28px; margin-bottom: 15px; font-weight: 600; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎵</div>
    <h1>Подключение к WeeklyPlayer</h1>
    <div class="spinner" id="spinner"></div>
    <p id="status">Обработка авторизации...</p>
    <div id="success" class="success" style="display: none;">
      ✅ <strong>Успешно!</strong><br>
      Авторизация прошла успешно.<br>
      Возврат в приложение...
    </div>
    <div id="error" class="error" style="display: none;"></div>
  </div>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    
    console.log('🎵 WeeklyPlayer OAuth Callback');
    console.log('Code:', code ? code.substring(0, 20) + '...' : 'none');
    console.log('Error:', error);
    
    // Отправляем код обратно в приложение
    if (error) {
      window.opener.postMessage({
        type: 'AUTH_ERROR',
        error: error
      }, '*');
      
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('error').innerHTML = '❌ Ошибка: ' + error;
      document.getElementById('error').style.display = 'block';
    } else if (code) {
      // Отправляем через postMessage (если окно ещё открыто)
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
        type: 'AUTH_SUCCESS',
        code: code
      }, '*');
    }
  
     // 🔥 И перенаправляем на localhost (Tauri перехватит)
    setTimeout(() => {
      window.location.href = `http://localhost:1420?code=${encodeURIComponent(code)}`;
    }, 1000);
  }
      
      // Показываем успех
      setTimeout(() => {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      }, 500);
      
      // Закрываем окно через 2 секунды
      setTimeout(() => {
        window.close();
      }, 2000);
    } else {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').innerHTML = '⚠️ Код авторизации не получен';
    }
  </script>
</body>
</html>
