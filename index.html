<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>WeeklyPlayer Auth</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; color: white; }
    .container { text-align: center; padding: 40px; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #f97316; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 WeeklyPlayer</h1>
    <div class="spinner"></div>
    <p>Перенаправление в приложение...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    
    if (code) {
      // 🔥 Перенаправляем на кастомный протокол
      setTimeout(() => {
        window.location.href = 'weeklyplayer://oauth-callback?code=' + encodeURIComponent(code);
      }, 1000);
    }
  </script>
</body>
</html>
