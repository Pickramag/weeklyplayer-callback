<!DOCTYPE html>
<html>
<head>
  <title>WeeklyPlayer Auth</title>
  <script>
    // Получаем code из URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    
    if (error) {
      document.body.innerHTML = `<h2>Ошибка авторизации: ${error}</h2>`;
    } else if (code) {
      // Перенаправляем в приложение через кастомный протокол
      window.location.href = `weeklyplayer://oauth-callback?code=${encodeURIComponent(code)}`;
    } else {
      document.body.innerHTML = '<h2>Ожидание кода авторизации...</h2>';
    }
  </script>
</head>
<body></body>
</html>
