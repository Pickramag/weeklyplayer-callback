<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to WeeklyPlayer...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 20px;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 500px;
      width: 100%;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #f97316;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success { color: #10b981; margin-top: 20px; font-size: 1.1em; }
    .error { color: #ef4444; margin-top: 20px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 28px; margin-bottom: 15px; font-weight: 600; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 10px; }
    .close-btn {
      margin-top: 30px;
      padding: 12px 30px;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .close-btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎵</div>
    <h1>Подключение к WeeklyPlayer</h1>
    <div class="spinner" id="spinner"></div>
    <p id="status">Подождите, происходит подключение...</p>
    <div id="success" class="success" style="display: none;">
      ✅ <strong>Успешно!</strong><br>
      Приложение получило код авторизации.<br>
      Можете закрыть это окно.
    </div>
    <div id="error" class="error" style="display: none;"></div>
    <button class="close-btn" id="closeBtn" onclick="closeWindow()" style="display: none;">
      Закрыть окно
    </button>
  </div>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    
    function attemptRedirect() {
      if (error) {
        showError('❌ Ошибка авторизации: ' + error);
        return;
      }
      
      if (!code) {
        showError('❌ Код авторизации не получен');
        return;
      }
      
      const customUrl = 'weeklyplayer://oauth-callback?code=' + encodeURIComponent(code);
      
      // Пробуем открыть приложение
      window.location.href = customUrl;
      
      // Показываем успех через 2 секунды
      setTimeout(() => {
        showSuccess();
      }, 2000);
    }
    
    function showSuccess() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      document.getElementById('closeBtn').style.display = 'inline-block';
      
      // Пробуем закрыть через 5 секунд
      setTimeout(() => closeWindow(), 5000);
    }
    
    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('error').innerHTML = msg;
      document.getElementById('error').style.display = 'block';
      document.getElementById('closeBtn').style.display = 'inline-block';
    }
    
    function closeWindow() {
      window.close();
      setTimeout(() => {
        if (!window.closed) {
          document.getElementById('error').innerHTML = 
            '⚠️ Не удалось закрыть окно автоматически.<br>' +
            'Если WeeklyPlayer открылся — можете закрыть эту вкладку вручную.';
          document.getElementById('error').style.display = 'block';
        }
      }, 500);
    }
    
    window.addEventListener('load', attemptRedirect);
    console.log('Code:', code ? code.substring(0, 20) + '...' : 'none');
  </script>
</body>
</html>
