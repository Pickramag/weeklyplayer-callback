<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to WeeklyPlayer...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 20px;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 500px;
      width: 100%;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #f97316;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success { color: #10b981; margin-top: 20px; font-size: 1.1em; }
    .error { color: #ef4444; margin-top: 20px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 28px; margin-bottom: 15px; font-weight: 600; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 10px; }
    .redirect-info {
      margin-top: 20px;
      padding: 15px;
      background: rgba(249, 115, 22, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(249, 115, 22, 0.3);
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎵</div>
    <h1>Подключение к WeeklyPlayer</h1>
    <div class="spinner" id="spinner"></div>
    <p id="status">Перенаправление в приложение...</p>
    <div id="success" class="success" style="display: none;">
      ✅ <strong>Успешно!</strong><br>
      Авторизация прошла успешно.<br>
      Возврат в приложение...
    </div>
    <div id="error" class="error" style="display: none;"></div>
    <div class="redirect-info" id="redirectInfo" style="display: none;">
      🔁 Если перенаправление не произошло автоматически,<br>
      просто вернитесь в приложение WeeklyPlayer
    </div>
  </div>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    
    console.log('🎵 WeeklyPlayer OAuth Callback');
    console.log('Code:', code ? code.substring(0, 20) + '...' : 'none');
    console.log('Error:', error);
    console.log('Full URL:', window.location.href);
    
    if (error) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('error').innerHTML = '❌ Ошибка авторизации: ' + error;
      document.getElementById('error').style.display = 'block';
      document.getElementById('redirectInfo').style.display = 'block';
    } else if (code) {
      // Показываем успех
      setTimeout(() => {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').style.display = 'none';
        document.getElementById('success').style.display = 'block';
        document.getElementById('redirectInfo').style.display = 'block';
      }, 1000);
      
      // 🔥 Перенаправляем на localhost:1420 (Tauri перехватит)
      setTimeout(() => {
        console.log('🔄 Redirecting to:', 'http://localhost:1420?code=' + encodeURIComponent(code));
        window.location.href = 'http://localhost:1420?code=' + encodeURIComponent(code);
      }, 1500);
      
      // Если не сработало — показываем инструкцию
      setTimeout(() => {
        if (!document.getElementById('success').style.display === 'none') {
          document.getElementById('redirectInfo').style.display = 'block';
        }
      }, 3000);
    } else {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').innerHTML = '⚠️ Код авторизации не получен';
      document.getElementById('redirectInfo').style.display = 'block';
    }
  </script>
</body>
</html>
